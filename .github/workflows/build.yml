name: Build executables

# Two ways to get builds:
#  1. Actions tab -> "Build executables" -> Run workflow -> publishes/updates
#     the rolling "latest" pre-release with everything attached
#  2. Push a tag like v1.0 -> a proper versioned GitHub Release is created
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            sep: ";"
            iconflag: "--icon=assets/logo.ico"
          - os: ubuntu-latest
            sep: ":"
            iconflag: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      # onedir (a folder, not a single file) starts in about a second;
      # onefile has to unpack ~120 MB to a temp dir on EVERY launch.
      # --noupx: UPX-compressed executables are a common heuristic trigger
      # for "generic packer/trojan" antivirus false positives, since it's
      # also how a lot of real malware self-packs.
      - name: Build app folder
        run: >
          pyinstaller --onedir --windowed --name AdviseeDocFiller --noupx
          --add-data "templates_docx${{ matrix.sep }}templates_docx"
          --add-data "assets${{ matrix.sep }}assets"
          --hidden-import docxcompose --collect-data docxcompose
          ${{ matrix.iconflag }}
          gui_app.py

      # Self-signed Authenticode signing. Free, but Windows only trusts it
      # on machines that import signing/AdviseeDocFiller-PublisherCert.cer
      # into the Trusted Publishers store (see README) - it will NOT clear
      # "Unknown Publisher" for the general public. No-ops until the
      # CODE_SIGN_PFX_BASE64/CODE_SIGN_PASSWORD secrets are added.
      - name: Import code signing certificate
        if: matrix.os == 'windows-latest' && env.HAS_CERT_SECRET == 'true'
        shell: pwsh
        run: |
          $bytes = [Convert]::FromBase64String("${{ secrets.CODE_SIGN_PFX_BASE64 }}")
          $pfxPath = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          [IO.File]::WriteAllBytes($pfxPath, $bytes)
          echo "PFX_PATH=$pfxPath" >> $env:GITHUB_ENV
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match 'x64' } | Select-Object -First 1 -ExpandProperty FullName
          echo "SIGNTOOL=$signtool" >> $env:GITHUB_ENV
        env:
          HAS_CERT_SECRET: ${{ secrets.CODE_SIGN_PFX_BASE64 != '' }}

      - name: Sign application executable
        if: matrix.os == 'windows-latest' && env.HAS_CERT_SECRET == 'true'
        shell: pwsh
        run: |
          & "$env:SIGNTOOL" sign /f "$env:PFX_PATH" /p "${{ secrets.CODE_SIGN_PASSWORD }}" `
            /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 `
            dist\AdviseeDocFiller\AdviseeDocFiller.exe
        env:
          HAS_CERT_SECRET: ${{ secrets.CODE_SIGN_PFX_BASE64 != '' }}

      - name: Zip Windows build (portable, copy-paste anywhere)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Compress-Archive -Path dist/AdviseeDocFiller -DestinationPath AdviseeDocFiller-windows-portable.zip

      - name: Upload Windows portable artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: AdviseeDocFiller-windows-portable
          path: AdviseeDocFiller-windows-portable.zip

      - name: Compute version
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          case "$VERSION" in
            ""|main|master|*/*) VERSION="1.0" ;;
          esac
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build Windows installer (Inno Setup)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=$env:APP_VERSION" installer.iss

      - name: Sign installer
        if: matrix.os == 'windows-latest' && env.HAS_CERT_SECRET == 'true'
        shell: pwsh
        run: |
          & "$env:SIGNTOOL" sign /f "$env:PFX_PATH" /p "${{ secrets.CODE_SIGN_PASSWORD }}" `
            /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 `
            (Get-ChildItem Output\AdviseeDocFiller-Setup-*.exe).FullName
        env:
          HAS_CERT_SECRET: ${{ secrets.CODE_SIGN_PFX_BASE64 != '' }}

      - name: Upload Windows installer artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: AdviseeDocFiller-windows-setup
          path: Output/AdviseeDocFiller-Setup-*.exe

      - name: Tar Linux build
        if: matrix.os == 'ubuntu-latest'
        run: tar -czf AdviseeDocFiller-linux.tar.gz -C dist AdviseeDocFiller

      - name: Upload Linux portable artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: AdviseeDocFiller-linux
          path: AdviseeDocFiller-linux.tar.gz

      - name: Package for Debian/Ubuntu, Fedora/RHEL, and Arch
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev build-essential rpm \
            libarchive-tools zstd
          sudo gem install --no-document fpm

          VERSION="${GITHUB_REF_NAME#v}"
          case "$VERSION" in
            ""|main|master|*/*) VERSION="1.0" ;;
          esac

          STAGE=pkgroot
          mkdir -p "$STAGE/opt" \
                   "$STAGE/usr/share/applications" \
                   "$STAGE/usr/share/icons/hicolor/256x256/apps" \
                   "$STAGE/usr/bin"
          cp -r dist/AdviseeDocFiller "$STAGE/opt/AdviseeDocFiller"
          chmod 755 "$STAGE/opt/AdviseeDocFiller/AdviseeDocFiller"
          install -m 644 assets/logo.png \
            "$STAGE/usr/share/icons/hicolor/256x256/apps/adviseedocfiller.png"
          ln -s /opt/AdviseeDocFiller/AdviseeDocFiller \
            "$STAGE/usr/bin/adviseedocfiller"
          cat > "$STAGE/usr/share/applications/adviseedocfiller.desktop" <<EOF
          [Desktop Entry]
          Type=Application
          Name=Advisee Document Filler
          Comment=Fill UNP CCIT Appraisal Sheets and Reports of Rating from grade listing PDFs
          Exec=/opt/AdviseeDocFiller/AdviseeDocFiller
          Icon=adviseedocfiller
          Terminal=false
          Categories=Office;
          EOF

          mkdir -p packages
          for TARGET in deb rpm pacman; do
            fpm -s dir -t "$TARGET" \
              -n adviseedocfiller \
              -v "$VERSION" \
              --license "MIT" \
              --maintainer "Yaksharo a.k.a Ezer" \
              --description "Fills UNP CCIT Appraisal Sheets and Reports of Rating from Periodic Grades Listing PDFs" \
              --url "https://github.com/${GITHUB_REPOSITORY}" \
              -p packages/ \
              -C "$STAGE" .
          done
          ls -la packages/

      - name: Upload Linux packages
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: packages/*

  release:
    needs: build
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write   # required for keyless Sigstore signing
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist

      # Keyless Sigstore signing: no private key/secret to manage. cosign
      # gets a short-lived cert from Fulcio tied to this workflow's GitHub
      # OIDC identity, signs a checksum manifest covering every artifact,
      # and records it on the public Rekor transparency log. Anyone can
      # then confirm a given download really came from this repo's build.yml
      # (see README for the verify command) - this does NOT touch Windows
      # Authenticode/SmartScreen/UAC, which only trust CA-issued certs.
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Checksum and sign release artifacts
        working-directory: dist
        run: |
          sha256sum * > SHA256SUMS
          cosign sign-blob --yes SHA256SUMS \
            --output-signature SHA256SUMS.sig \
            --output-certificate SHA256SUMS.pem

      # Tag pushes (v1.0, v2.3...) publish a normal versioned release.
      # Manual "Run workflow" runs (no tag) publish/update a rolling
      # "latest" pre-release, so every manual run still ends up somewhere
      # visible on the repo's Releases page instead of only as a
      # sign-in-required, 90-day Actions artifact.
      - name: Determine release tag
        id: rel
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
            echo "name=Latest build (${GITHUB_SHA::7})" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rel.outputs.tag }}
          name: ${{ steps.rel.outputs.name }}
          prerelease: ${{ steps.rel.outputs.prerelease }}
          files: dist/*

      # Free VirusTotal multi-engine scan of every release artifact. Purely
      # diagnostic - it does not whitelist the build with any engine, it
      # just tells you (and anyone reading the release) what flagged it, so
      # you know where to file a false-positive report. Results always land
      # in this step's Job Summary; update_release_body additionally tries
      # to append links to the release notes (may not apply to the rolling
      # "latest" pre-release on manual runs). No-ops until VT_API_KEY is set.
      - name: VirusTotal scan
        if: env.HAS_VT_KEY == 'true'
        uses: crazy-max/ghaction-virustotal@v4
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          update_release_body: true
          files: |
            dist/*
        env:
          HAS_VT_KEY: ${{ secrets.VT_API_KEY != '' }}

name: Publish to winget

# Manual, on-demand only - never runs on a tag push. You trigger it
# yourself from the Actions tab for a release you've already decided is
# ready, and by default it only builds a preview for you to inspect
# (uploaded as a workflow artifact) rather than actually publishing
# anywhere. Flip winget_submit only once you're satisfied with that preview.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish, matching an existing release tag (accepts 1.01, v1.01, or V1.01)"
        required: true
      winget_submit:
        description: "Actually open the winget-pkgs PR (needs the WINGET_GH_TOKEN secret). Unchecked = preview manifest only."
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.norm.outputs.version }}
    steps:
      - id: norm
        shell: bash
        run: |
          # Normalize to exactly one lowercase "v" prefix, whatever you typed
          # (1.01, v1.01, V1.01 all become v1.01) - the v is kept everywhere
          # downstream (installer filename, PackageVersion, etc.), not
          # stripped, so it matches the git tag exactly.
          v="${{ inputs.version }}"
          v="${v#v}"
          v="${v#V}"
          v="v$v"
          echo "version=$v" >> "$GITHUB_OUTPUT"

  winget:
    needs: resolve
    runs-on: windows-latest
    steps:
      - name: Check required secret
        if: env.HAS_WINGET_TOKEN == 'false'
        shell: pwsh
        run: |
          Write-Error "WINGET_GH_TOKEN secret is not set. wingetcreate needs it even to preview (it reads the existing manifest from microsoft/winget-pkgs via the GitHub API), not just to submit."
          exit 1
        env:
          HAS_WINGET_TOKEN: ${{ secrets.WINGET_GH_TOKEN != '' }}

      - name: Download wingetcreate
        shell: pwsh
        run: Invoke-WebRequest https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe

      - name: Create/update manifest
        shell: pwsh
        run: |
          $version = "${{ needs.resolve.outputs.version }}"
          $installerUrl = "https://github.com/Yaksharo/appraisal-filler/releases/download/$version/AdviseeDocFiller-Setup-$version.exe"
          $wingetArgs = @(
            "update", "Yaksharo.AdviseeDocFiller",
            "--version", $version,
            "--urls", $installerUrl,
            "--out", "manifests",
            "--token", "${{ secrets.WINGET_GH_TOKEN }}"
          )
          if ("${{ inputs.winget_submit }}" -eq "true") {
            $wingetArgs += "--submit"
          }
          ./wingetcreate.exe @wingetArgs

      # First-ever submission for this app: `update` has nothing to update
      # yet and will fail even with a valid token. Run
      # `wingetcreate new <installer-url>` once yourself, interactively
      # (see README) - after that manifest is merged, this job's `update`
      # path works for every release after.

      - name: Upload manifest for review
        if: inputs.winget_submit == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: winget-manifest-${{ needs.resolve.outputs.version }}
          path: manifests/**

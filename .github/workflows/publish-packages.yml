name: Publish to winget / Chocolatey

# Manual, on-demand only - never runs on a tag push. You trigger it
# yourself from the Actions tab for a release you've already decided is
# ready, and by default it only builds a preview for you to inspect
# (uploaded as a workflow artifact) rather than actually publishing
# anywhere. Flip the winget_submit/choco_push inputs only once you're
# satisfied with that preview.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish, matching an existing vX.Y release tag (e.g. 1.01)"
        required: true
      winget_submit:
        description: "Actually open the winget-pkgs PR (needs the WINGET_GH_TOKEN secret). Unchecked = preview manifest only."
        type: boolean
        default: false
      choco_push:
        description: "Actually push to the Chocolatey Community Repository (needs the CHOCO_API_KEY secret). Unchecked = build the .nupkg only."
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  winget:
    runs-on: windows-latest
    steps:
      - name: Download wingetcreate
        shell: pwsh
        run: Invoke-WebRequest https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe

      - name: Create/update manifest
        shell: pwsh
        run: |
          $installerUrl = "https://github.com/Yaksharo/appraisal-filler/releases/download/v${{ inputs.version }}/AdviseeDocFiller-Setup-${{ inputs.version }}.exe"
          $wingetArgs = @(
            "update", "Yaksharo.AdviseeDocFiller",
            "--version", "${{ inputs.version }}",
            "--urls", $installerUrl,
            "--out", "manifests"
          )
          if ("${{ inputs.winget_submit }}" -eq "true") {
            $wingetArgs += @("--submit", "--token", "${{ secrets.WINGET_GH_TOKEN }}")
          }
          ./wingetcreate.exe @wingetArgs

      # If this is the very first-ever submission for this app, `update`
      # will fail because there's no existing manifest to update. Run
      # `wingetcreate new $installerUrl` once locally instead (see README),
      # then this workflow's `update` path works for every release after.

      - name: Upload manifest for review
        if: inputs.winget_submit == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: winget-manifest-${{ inputs.version }}
          path: manifests/**

  chocolatey:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Look up checksum from the release's SHA256SUMS
        shell: pwsh
        run: |
          $sums = Invoke-WebRequest "https://github.com/Yaksharo/appraisal-filler/releases/download/v${{ inputs.version }}/SHA256SUMS" -UseBasicParsing
          $line = ($sums.Content -split "`n") | Where-Object { $_ -match "AdviseeDocFiller-Setup-${{ inputs.version }}\.exe" }
          if (-not $line) { throw "Couldn't find AdviseeDocFiller-Setup-${{ inputs.version }}.exe in that release's SHA256SUMS" }
          $checksum = ($line -split '\s+')[0]
          echo "CHECKSUM=$checksum" >> $env:GITHUB_ENV

      - name: Fill in version, URL and checksum
        shell: pwsh
        run: |
          $installerUrl = "https://github.com/Yaksharo/appraisal-filler/releases/download/v${{ inputs.version }}/AdviseeDocFiller-Setup-${{ inputs.version }}.exe"
          $installScript = "packaging/chocolatey/tools/chocolateyinstall.ps1"
          (Get-Content $installScript) `
            -replace "\`$url\s*=.*", "`$url      = '$installerUrl'" `
            -replace "\`$checksum\s*=.*", "`$checksum = '$env:CHECKSUM'" |
            Set-Content $installScript

          (Get-Content "packaging/chocolatey/adviseedocfiller.nuspec") `
            -replace "<version>.*</version>", "<version>${{ inputs.version }}</version>" |
            Set-Content "packaging/chocolatey/adviseedocfiller.nuspec"

      - name: choco pack
        working-directory: packaging/chocolatey
        shell: pwsh
        run: choco pack adviseedocfiller.nuspec --outputdirectory .

      - name: Upload package for review
        if: inputs.choco_push == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: chocolatey-package-${{ inputs.version }}
          path: packaging/chocolatey/*.nupkg

      - name: Push to Chocolatey
        if: inputs.choco_push == 'true'
        working-directory: packaging/chocolatey
        shell: pwsh
        run: |
          $pkg = (Get-ChildItem *.nupkg | Select-Object -First 1).FullName
          choco push $pkg --source https://push.chocolatey.org/ --api-key "${{ secrets.CHOCO_API_KEY }}"
